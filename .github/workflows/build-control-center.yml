name: Build Windows Control Center

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "control_center/**"
      - "control_center_app.py"
      - "scripts/**"
      - "bot.py"
      - "requirements*.txt"
      - "package.json"
      - "web/**"
      - ".github/workflows/build-control-center.yml"
  push:
    branches: [main]
    paths:
      - "control_center/**"
      - "control_center_app.py"
      - "scripts/**"
      - "bot.py"
      - "requirements*.txt"
      - "package.json"
      - "web/**"
      - ".github/workflows/build-control-center.yml"

permissions:
  contents: write

concurrency:
  group: control-center-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-portable:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-control-center.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build portable control center
        shell: pwsh
        run: ./scripts/build_control_center.ps1

      - name: Generate SHA256 checksum
        shell: pwsh
        run: |
          $Hash = (Get-FileHash "dist/TG-Suoyin-Control-Center-portable.zip" -Algorithm SHA256).Hash.ToLower()
          "$Hash  TG-Suoyin-Control-Center-portable.zip" | Set-Content "dist/TG-Suoyin-Control-Center-portable.zip.sha256" -Encoding ascii

      - name: Upload Windows portable package
        uses: actions/upload-artifact@v4
        with:
          name: TG-Suoyin-Control-Center-Windows
          path: |
            dist/TG-Suoyin-Control-Center-portable.zip
            dist/TG-Suoyin-Control-Center-portable.zip.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish EXE and built frontend to main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $BuiltExe = "dist/control-center-exe/TG-Suoyin-Control-Center.exe"
          if (-not (Test-Path $BuiltExe)) {
              throw "Missing built executable: $BuiltExe"
          }
          if (-not (Test-Path "web/dist/index.html")) {
              throw "Missing built frontend: web/dist/index.html"
          }

          Copy-Item $BuiltExe "TG-Suoyin-Control-Center.exe" -Force

          @(
              "source_commit=$env:GITHUB_SHA"
              "workflow_run=$env:GITHUB_RUN_NUMBER"
              "built_utc=$([DateTime]::UtcNow.ToString('yyyy-MM-ddTHH:mm:ssZ'))"
          ) | Set-Content "CONTROL_CENTER_BUILD.txt" -Encoding ascii

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -f -- "TG-Suoyin-Control-Center.exe" "CONTROL_CENTER_BUILD.txt" "web/dist"

          git diff --cached --stat
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
              Write-Host "Runnable assets are already up to date."
              exit 0
          }

          git commit -m "chore: publish Windows control center [skip ci]"
          git push origin HEAD:main
