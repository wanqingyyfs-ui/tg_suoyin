name: Build TG Control Center

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - agent/tg-control-center-20260711
    paths:
      - "control_center.py"
      - "TGControlCenter.spec"
      - "requirements-control-center.txt"
      - "requirements.txt"
      - "bot.py"
      - "scripts/**"
      - "web/**"
      - ".github/workflows/build-control-center.yml"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-control-center.txt

      - name: Install frontend dependencies
        shell: pwsh
        run: npm install --prefix web

      - name: Export current frontend data
        shell: pwsh
        run: python scripts/export_frontend_data.py

      - name: Build Astro frontend
        shell: pwsh
        run: npm run build --prefix web

      - name: Validate Python sources
        shell: pwsh
        run: |
          python -m py_compile control_center.py bot.py
          Get-ChildItem scripts -Filter *.py | ForEach-Object { python -m py_compile $_.FullName }

      - name: Build desktop application
        shell: pwsh
        run: python -m PyInstaller --clean --noconfirm TGControlCenter.spec

      - name: Smoke test packaged service entry
        shell: pwsh
        run: |
          $Exe = "dist\TG索引控制中心\TG索引控制中心.exe"
          if (-not (Test-Path $Exe)) { throw "EXE was not created" }
          $Process = Start-Process -FilePath $Exe -ArgumentList "--service", "export" -PassThru -WindowStyle Hidden
          if (-not $Process.WaitForExit(60000)) {
            $Process.Kill()
            throw "Packaged export smoke test timed out"
          }
          if ($Process.ExitCode -ne 0) { throw "Packaged export smoke test failed with exit code $($Process.ExitCode)" }

      - name: Create portable ZIP
        shell: pwsh
        run: Compress-Archive -Path "dist\TG索引控制中心\*" -DestinationPath "dist\TG索引控制中心-Windows-x64.zip" -CompressionLevel Optimal

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: TG索引控制中心-Windows-x64
          path: dist/TG索引控制中心-Windows-x64.zip
          if-no-files-found: error
          retention-days: 30
