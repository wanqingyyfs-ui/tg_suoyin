name: rectg maintenance

on:
  workflow_dispatch:
  schedule:
    - cron: "12 20 * * *"

permissions:
  contents: write

jobs:
  export-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Export frontend data
        run: python scripts/maintenance.py --export

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update generated frontend data"
          file_pattern: web/public/data.json web/public/sitemap.xml web/public/robots.txt
